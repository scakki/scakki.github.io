    /* Masonry Grid layout */
    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); /* Columns adjust dynamically */
      grid-auto-rows: 1fr; /* Ensures items will adjust to their content's height */
      gap: 10px; /* Spacing between images */
    }

    .image-grid .project-thumb {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .image-grid img, .image-grid video {
      width: 100%;
      height: auto;
      border-radius: 8px;
      transition: transform 0.3s ease;
    }

    .image-grid img:hover, .image-grid video:hover {
      transform: scale(1.05);
    }

    .caption {
      font-size: 14px;
      color: #555;
      margin-top: 5px;
      text-align: center;
    }

    /* Make the layout responsive */
    @media (max-width: 768px) {
      .image-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); /* Make columns smaller on smaller screens */
      }
    }
  </style>
</head>
